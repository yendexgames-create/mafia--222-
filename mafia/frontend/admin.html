<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Mafia Game</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margn: 0 auto;
            padding: 2rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-title {
            color: var(--text-primary);
            margin: 0;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }
        .users-table th, 
        .users-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .users-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }
        .users-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .action-btn {
            padding: 0.25rem 0.5rem;
            margin-right: 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .edit-btn {
            background: #3498db;
            color: white;
        }
        .save-btn {
            background: #2ecc71;
            color: white;
            display: none;
        }
        .cancel-btn {
            background: #95a5a6;
            color: white;
            display: none;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        .editable {
            background: rgba(52, 152, 219, 0.1);
        }
        .search-bar {
            margin-bottom: 1.5rem;
        }
        .search-bar input {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
    </style>
</head>
<body class="dark">
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title">Admin Panel</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <div class="search-bar">
            <input type="text" id="searchUsers" placeholder="Search users...">
        </div>

        <div class="table-responsive">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Password hash</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Reworked admin script: token-based auth, XSS-safe rendering, event delegation, optional server calls.

        // Require an admin token instead of a simple flag
        const token = sessionStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin-login.html';
        }

        // Logout: remove token
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        });

        // Simple HTML escape to prevent XSS when inserting user-generated content
        function escapeHtml(str) {
            return String(str == null ? '' : str).replace(/[&<>"']/g, function(s) {
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[s];
            });
        }

        // Fallback sample data (used if server not available)
        let users = [
            { id: 1, username: 'player1', email: 'player1@example.com', role: 'user', status: 'active' },
            { id: 2, username: 'player2', email: 'player2@example.com', role: 'user', status: 'active' },
            { id: 3, username: 'moderator1', email: 'mod@example.com', role: 'moderator', status: 'active' },
            { id: 4, username: 'admin', email: 'admin@example.com', role: 'admin', status: 'active' },
        ];

        // Try to load users from backend API (optional — requires backend)
        async function fetchUsersFromServer() {
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data)) users = data;
                } else {
                    console.warn('Failed to fetch users from server, status:', res.status);
                }
            } catch (e) {
                console.warn('Could not fetch users from server, using local data.');
            }
        }

        // Render users into table (adds passwordHash column)
        function renderUsers(usersToRender = users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            usersToRender.forEach(user => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-id', user._id || user.id || '');

                // id
                const idTd = document.createElement('td');
                idTd.textContent = user._id || user.id || '';

                // username, email, role, status (existing)
                const usernameTd = document.createElement('td');
                usernameTd.className = 'editable';
                usernameTd.setAttribute('data-field', 'username');
                usernameTd.textContent = user.username || '';

                const emailTd = document.createElement('td');
                emailTd.className = 'editable';
                emailTd.setAttribute('data-field', 'email');
                emailTd.textContent = user.email || '';

                const roleTd = document.createElement('td');
                roleTd.className = 'editable';
                roleTd.setAttribute('data-field', 'role');
                roleTd.textContent = user.role || '';

                const statusTd = document.createElement('td');
                statusTd.className = 'editable';
                statusTd.setAttribute('data-field', 'status');
                statusTd.textContent = user.status || '';

                // passwordHash cell (read-only)
                const passTd = document.createElement('td');
                passTd.textContent = user.passwordHash ? (user.passwordHash.slice(0, 10) + '...') : '';

                // actions including reset-password button
                const actionsTd = document.createElement('td');
                actionsTd.innerHTML = `
                    <button class="action-btn edit-btn" data-action="edit">Edit</button>
                    <button class="action-btn save-btn" data-action="save" style="display:none">Save</button>
                    <button class="action-btn cancel-btn" data-action="cancel" style="display:none">Cancel</button>
                    <button class="action-btn delete-btn" data-action="delete">Delete</button>
                    <button class="action-btn" data-action="reset">Reset PW</button>
                `;

                tr.appendChild(idTd);
                tr.appendChild(usernameTd);
                tr.appendChild(emailTd);
                tr.appendChild(roleTd);
                tr.appendChild(statusTd);
                tr.appendChild(passTd);
                tr.appendChild(actionsTd);

                tbody.appendChild(tr);
            });
        }

        // Enter edit mode for a row
        function enterEditMode(row) {
            const cells = row.querySelectorAll('.editable');
            cells.forEach(cell => {
                const field = cell.getAttribute('data-field');
                const value = cell.textContent;

                if (field === 'role') {
                    const select = document.createElement('select');
                    ['user','moderator','admin'].forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt;
                        o.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
                        if (opt === value) o.selected = true;
                        select.appendChild(o);
                    });
                    select.style.width = '100%';
                    select.style.padding = '5px';
                    cell.innerHTML = '';
                    cell.appendChild(select);
                } else if (field === 'status') {
                    const select = document.createElement('select');
                    ['active','banned','suspended'].forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt;
                        o.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
                        if (opt === value) o.selected = true;
                        select.appendChild(o);
                    });
                    select.style.width = '100%';
                    select.style.padding = '5px';
                    cell.innerHTML = '';
                    cell.appendChild(select);
                } else {
                    cell.setAttribute('contenteditable', 'true');
                    cell.classList.add('editing');
                    // place caret at end
                    const range = document.createRange();
                    const sel = window.getSelection();
                    range.selectNodeContents(cell);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            });

            toggleRowButtons(row, 'editing');
        }

        // Exit edit mode without saving (re-render to original values)
        function cancelEdit(row) {
            renderUsers();
        }

        // Save edits from a row to local array and attempt server update
        async function saveEdit(row) {
            const id = Number(row.getAttribute('data-id'));
            const user = users.find(u => u.id === id);
            if (!user) return;

            const cells = row.querySelectorAll('.editable');
            cells.forEach(cell => {
                const field = cell.getAttribute('data-field');
                if (field === 'role' || field === 'status') {
                    const sel = cell.querySelector('select');
                    if (sel) user[field] = escapeHtml(sel.value.trim());
                } else {
                    const text = cell.textContent.trim();
                    user[field] = escapeHtml(text);
                }
            });

            // Attempt to update on server if endpoint exists
            try {
                const res = await fetch('/api/admin/users/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(user)
                });
                if (!res.ok) {
                    console.warn('Server update failed, changes are local only.');
                }
            } catch (e) {
                console.warn('Update request failed, using local changes.');
            }

            renderUsers();
            alert('User updated successfully!');
        }

        // Delete a user (confirm + server call if available)
        async function deleteUserRow(row) {
            const id = Number(row.getAttribute('data-id'));
            if (!confirm('Are you sure you want to delete this user?')) return;

            // Try server delete
            let serverOk = false;
            try {
                const res = await fetch('/api/admin/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                serverOk = res.ok;
            } catch (e) {
                console.warn('Delete request failed, proceeding locally.');
            }

            // Always remove locally
            users = users.filter(u => u.id !== id);
            renderUsers();
            alert('User deleted successfully!');
        }

        // Reset password: prompt admin for new password and call server
        async function resetPasswordRow(row) {
            const id = row.getAttribute('data-id');
            const newPassword = prompt('Enter a new password for this user (min 6 chars):');
            if (!newPassword || newPassword.length < 6) { alert('Password too short or cancelled.'); return; }

            try {
                const res = await fetch('/api/admin/users/' + id + '/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ newPassword })
                });
                if (!res.ok) {
                    alert('Failed to reset password (server).');
                } else {
                    alert('Password reset successfully.');
                }
            } catch (e) {
                alert('Request failed; password not reset on server.');
            }
        }

        // Helper to toggle button visibility in a row
        function toggleRowButtons(row, mode) {
            const editBtn = row.querySelector('[data-action="edit"]');
            const saveBtn = row.querySelector('[data-action="save"]');
            const cancelBtn = row.querySelector('[data-action="cancel"]');

            if (mode === 'editing') {
                if (editBtn) editBtn.style.display = 'none';
                if (saveBtn) saveBtn.style.display = 'inline-block';
                if (cancelBtn) cancelBtn.style.display = 'inline-block';
            } else {
                if (editBtn) editBtn.style.display = '';
                if (saveBtn) saveBtn.style.display = 'none';
                if (cancelBtn) cancelBtn.style.display = 'none';
            }
        }

        // Event delegation for action buttons in the table
        document.getElementById('usersTableBody').addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            const action = btn.getAttribute('data-action');
            const row = btn.closest('tr');
            if (!row) return;

            if (action === 'edit') {
                enterEditMode(row);
            } else if (action === 'save') {
                saveEdit(row);
            } else if (action === 'cancel') {
                cancelEdit(row);
            } else if (action === 'delete') {
                deleteUserRow(row);
            } else if (action === 'reset') {
                resetPasswordRow(row);
            }
        });

        // Search functionality (unchanged but safe)
        document.getElementById('searchUsers').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredUsers = users.filter(user =>
                (user.username || '').toLowerCase().includes(searchTerm) ||
                (user.email || '').toLowerCase().includes(searchTerm)
            );
            renderUsers(filteredUsers);
        });

        // Initialize: try to fetch from server then render
        (async function init() {
            await fetchUsersFromServer();
            renderUsers();
        })();
    </script>
</body>
</html>
