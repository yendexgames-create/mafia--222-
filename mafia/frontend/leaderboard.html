<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Leaderboard — MafiaArena</title>
<meta name="description" content="Top players — weekly, monthly and all-time rankings." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
:root{--neon:#1F6FEB;--accent:#FFD369;--header-h:64px}
html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#071021,#0d1117 40%);color:#e6eef6}
.topbar{position:fixed;left:0;right:0;top:0;height:var(--header-h);display:flex;align-items:center;z-index:60;backdrop-filter:blur(8px);background:linear-gradient(180deg,rgba(7,18,33,0.6),rgba(7,18,33,0.35));border-bottom:1px solid rgba(255,255,255,0.02)}
.topbar-inner{width:100%;max-width:1300px;margin:0 auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:var(--header-h)}
.brand{font-weight:800;background:linear-gradient(90deg,#ff6b6b,#ffd369);-webkit-background-clip:text;background-clip:text;color:transparent}
.nav{display:flex;gap:14px;align-items:center}
.btn{padding:8px 12px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-primary{background:linear-gradient(90deg,var(--neon),#00BFA6);color:#07121a;border:0}
.container{max-width:1200px;margin:0 auto;padding:calc(var(--header-h) + 20px) 18px 60px}
.header-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-btn{padding:8px 12px;border-radius:999px;background:transparent;border:1px solid rgba(255,255,255,0.06);cursor:pointer}
.filter-btn.active{background:linear-gradient(90deg,var(--neon),#00BFA6);color:#07121a;border:0}
.search{padding:8px 12px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);color:inherit;min-width:220px}
.table-wrap{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.04));border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.03)}
table{width:100%;border-collapse:collapse;color:inherit}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.03)}
th{font-size:13px;opacity:.9}
.rank{width:64px}
.avatar{width:40px;height:40px;border-radius:8px;background:#0b1220;display:inline-flex;align-items:center;justify-content:center;margin-right:8px}
.username{display:flex;align-items:center}
.role-badge{padding:6px 8px;border-radius:999px;background:rgba(255,255,255,0.04);font-weight:700}
@media (max-width:880px){
  table{display:none}
  .cards{display:block}
}
.cards{display:none;gap:12px}
.card{padding:12px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.04));margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.muted{color:rgba(230,238,246,0.7)}
/* background visuals */
.bg-anim{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(120px) saturate(120%);opacity:0.08}
.particles{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;filter:blur(6px);mix-blend-mode:screen;opacity:.9;animation:float var(--dur) linear infinite}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-60px)}100%{transform:translateY(0)}}
.smoke{position:fixed;inset:0;pointer-events:none;z-index:3;opacity:.28;filter:blur(1px)}
.custom-cursor{position:fixed;left:0;top:0;width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,80,80,0.9);transform:translate(-50%,-50%);pointer-events:none;z-index:9999;mix-blend-mode:screen;transition:transform .08s linear}
</style>
</head>
<body>
  <div class="bg-anim" aria-hidden="true">
    <div class="bg-blob" style="width:520px;height:520px;left:-80px;top:8%;background:radial-gradient(circle,#1F6FEB,#00BFA6)"></div>
    <div class="bg-blob" style="width:420px;height:420px;right:-100px;top:30%;background:radial-gradient(circle,#FFD369,#FF8A5B)"></div>
  </div>

  <div class="particles" id="particles" aria-hidden="true"></div>
  <canvas id="smoke" class="smoke" width="1600" height="900" aria-hidden="true"></canvas>
  <div id="cursor" class="custom-cursor" aria-hidden="true"></div>

  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <div class="brand">MafiaArena</div>
      <nav class="nav" aria-label="Main">
        <a href="index.html">Home</a>
        <a href="play.html">Play</a>

      </nav>
    </div>
  </header>

  <main class="container" role="main">
    <div class="header-row">
      <h1 style="margin:0">Leaderboard</h1>
      <div class="controls">
        <div>
          <button class="filter-btn active" data-period="weekly">Weekly</button>
          <button class="filter-btn" data-period="monthly">Monthly</button>
          <button class="filter-btn" data-period="all">All-Time</button>
        </div>
        <input id="search" class="search" placeholder="Search by username or country" aria-label="Search players">
      </div>
    </div>

    <div class="table-wrap fade" id="tableWrap">
      <table aria-label="Leaderboard table">
        <thead>
          <tr><th class="rank">Rank</th><th>Player</th><th>Country</th><th>Wins</th><th>Points</th><th>Role</th></tr>
        </thead>
        <tbody id="tableBody">
          <!-- rows rendered by JS -->
        </tbody>
      </table>

      <div class="cards" id="cardList" aria-live="polite">
        <!-- mobile cards -->
      </div>
    </div>
  </main>

<script>
document.addEventListener('DOMContentLoaded', ()=> {
  const mock = [
    {rank:1,avatar:'A',username:'DonVito',country:'US',wins:482,points:12540,role:'Mafia'},
    {rank:2,avatar:'L',username:'LadyLuck',country:'RU',wins:402,points:11024,role:'Detective'},
    {rank:3,avatar:'S',username:'SneakySam',country:'UZ',wins:391,points:10800,role:'Civilian'},
    {rank:4,avatar:'M',username:'MisterX',country:'US',wins:345,points:9800,role:'Doctor'},
    {rank:5,avatar:'R',username:'RedEyes',country:'GB',wins:320,points:9500,role:'Mafia'}
  ];
  let data = mock.slice();
  const tableBody = document.getElementById('tableBody');
  const cardList = document.getElementById('cardList');

  function renderTable(list){
    tableBody.innerHTML = '';
    list.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="rank">${p.rank}</td>
        <td><div class="username"><div class="avatar">${p.avatar}</div><div><strong>${p.username}</strong><div class="muted" style="font-size:12px">${p.country}</div></div></div></td>
        <td>${p.country}</td><td>${p.wins}</td><td>${p.points}</td><td><span class="role-badge">${p.role}</span></td>`;
      tableBody.appendChild(tr);
    });
  }
  function renderCards(list){
    cardList.innerHTML = '';
    list.forEach(p=>{
      const d = document.createElement('div'); d.className='card';
      d.innerHTML = `<div style="display:flex;gap:12px;align-items:center"><div class="avatar">${p.avatar}</div><div><strong>${p.username}</strong><div class="muted" style="font-size:12px">${p.country}</div></div></div><div style="text-align:right"><div style="font-weight:700">${p.points}</div><div class="muted" style="font-size:12px">${p.wins} wins</div></div>`;
      cardList.appendChild(d);
    });
  }

  function applyFilter(period){
    // placeholder: in real app fetch different datasets
    // here we just reorder for demo
    if(period === 'weekly') data = mock.slice();
    else if(period === 'monthly') data = mock.slice().reverse();
    else data = mock.slice();
    renderTable(data);
    renderCards(data);
  }

  // initial render
  renderTable(data);
  renderCards(data);

  // filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.period);
    });
  });

  // search
  const search = document.getElementById('search');
  search.addEventListener('input', ()=> {
    const q = search.value.trim().toLowerCase();
    const filtered = data.filter(p => p.username.toLowerCase().includes(q) || p.country.toLowerCase().includes(q));
    renderTable(filtered); renderCards(filtered);
  });

  // particles, smoke, cursor (same approach as other pages)
  const prefersReduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const particles = document.getElementById('particles');
  if(particles && !prefersReduced){
    const count = Math.max(12, Math.floor(window.innerWidth/80));
    for(let i=0;i<count;i++){
      const el = document.createElement('div'); el.className='particle';
      const s = 3 + Math.random()*8; el.style.width = el.style.height = s+'px';
      el.style.left = (Math.random()*100)+'%'; el.style.top = (Math.random()*100)+'%';
      el.style.setProperty('--dur', (6 + Math.random()*8)+'s');
      particles.appendChild(el);
    }
  }
  const canvas = document.getElementById('smoke');
  if(canvas && !prefersReduced){
    const ctx = canvas.getContext('2d'); let t=0;
    (function loop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<4;i++){
        ctx.beginPath();
        const y = canvas.height*0.45 + Math.sin(t*0.5 + i)*12*(i+1);
        ctx.ellipse(canvas.width*0.5, y, canvas.width*0.45 - i*80, 30 + i*8, 0,0,Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${0.006 + i*0.007})`;
        ctx.fill();
      }
      t += 0.01; requestAnimationFrame(loop);
    })();
  }
  const cursor = document.getElementById('cursor');
  if(cursor) document.addEventListener('mousemove', e=> cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`);
});
</script>
</body>
</html>
