<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login — MafiaArena</title>
<meta name="description" content="Login to your MafiaArena account" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<style>
/* Login specific styles */
.login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: linear-gradient(180deg, var(--bg-primary), var(--bg-secondary));
}

.login-card {
  width: 100%;
  max-width: 420px;
  background: linear-gradient(180deg, var(--glass), rgba(0, 0, 0, 0.1));
  padding: 32px;
  border-radius: var(--border-radius);
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow);
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-header h2 {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.login-header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text-primary);
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: var(--glass);
  color: var(--text-primary);
  font-size: 16px;
  transition: var(--transition);
}

.form-group input:focus {
  outline: none;
  border-color: var(--primary-color);
  box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.2);
}

.form-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
}

.remember-me input[type="checkbox"] {
  width: auto;
  margin: 0;
}

.forgot-link {
  color: var(--primary-color);
  text-decoration: none;
  font-size: 0.9rem;
  transition: var(--transition);
}

.forgot-link:hover {
  color: var(--accent-color);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, var(--primary-color), var(--success-color));
  color: var(--bg-primary);
  border: none;
  border-radius: 8px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 20px;
}

.login-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(31, 111, 235, 0.3);
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.divider {
  text-align: center;
  margin: 24px 0;
  position: relative;
}

.divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--border-color);
}

.divider span {
  background: var(--bg-tertiary);
  padding: 0 16px;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.social-login {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: var(--glass);
  color: var(--text-primary);
  text-decoration: none;
  font-weight: 600;
  transition: var(--transition);
}

.social-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  transform: translateY(-1px);
}

.signup-link {
  text-align: center;
  margin-top: 24px;
  color: var(--text-secondary);
}

.signup-link a {
  color: var(--primary-color);
  text-decoration: none;
  font-weight: 600;
}

.signup-link a:hover {
  color: var(--accent-color);
}

.error-message {
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid var(--danger-color);
  color: var(--danger-color);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  display: none;
}

.success-message {
  background: rgba(0, 191, 166, 0.1);
  border: 1px solid var(--success-color);
  color: var(--success-color);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  display: none;
}

/* Mobile responsive */
@media (max-width: 480px) {
  .login-container {
    padding: 12px;
  }
  
  .login-card {
    padding: 24px;
  }
  
  .login-header h2 {
    font-size: 1.5rem;
  }
  
  .form-footer {
    flex-direction: column;
    gap: 12px;
    align-items: stretch;
  }
}
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Login to your MafiaArena account</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="lemail">Email Address</label>
          <input 
            id="lemail" 
            type="email" 
            placeholder="Enter your email" 
            required 
            autocomplete="email"
            inputmode="email"
          />
        </div>

        <div class="form-group">
          <label for="lpass">Password</label>
          <input 
            id="lpass" 
            type="password" 
            placeholder="Enter your password" 
            required 
            autocomplete="current-password"
          />
        </div>

        <div class="form-footer">
          <label class="remember-me">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span id="btnText">Login</span>
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="social-login">
        <a href="#" class="social-btn">
          <span>🔷</span>
          <span>Continue with Discord</span>
        </a>
        <a href="#" class="social-btn">
          <span>📧</span>
          <span>Continue with Google</span>
        </a>
      </div>

      <div class="signup-link">
        Don't have an account? <a href="register.html">Sign up</a>
      </div>
    </div>
  </div>

<script>
/* filepath: c:\Users\Acer\Desktop\mafia\frontend\login.html */
(function(){
  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('errorMessage');
  const successEl = document.getElementById('successMessage');
  const loginBtn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  
  function saveSession(user, token){ 
    try{ 
      localStorage.setItem('mafiaUser', JSON.stringify(user));
      localStorage.setItem('mafiaToken', token);
      
      // Save remember me preference
      const rememberMe = document.getElementById('remember').checked;
      if (rememberMe) {
        localStorage.setItem('mafiaRemember', 'true');
      } else {
        localStorage.removeItem('mafiaRemember');
      }
    }catch(e){ 
      console.error('Failed to save session:', e);
    } 
  }

  function showError(message){
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    successEl.style.display = 'none';
    
    // Auto hide after 5 seconds
    setTimeout(() => {
      errorEl.style.display = 'none';
    }, 5000);
  }

  function showSuccess(message){
    successEl.textContent = message;
    successEl.style.display = 'block';
    errorEl.style.display = 'none';
  }

  function setLoading(isLoading){
    if (isLoading) {
      loginBtn.disabled = true;
      btnText.textContent = 'Logging in...';
      loginBtn.style.opacity = '0.7';
    } else {
      loginBtn.disabled = false;
      btnText.textContent = 'Login';
      loginBtn.style.opacity = '1';
    }
  }

  function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
  }

  // Check if user should be remembered
  const rememberMe = localStorage.getItem('mafiaRemember') === 'true';
  if (rememberMe) {
    document.getElementById('remember').checked = true;
  }

  form && form.addEventListener('submit', async function(e){
    e.preventDefault();
    errorEl.style.display = 'none';
    successEl.style.display = 'none';
    
    const email = (document.getElementById('lemail').value||'').trim().toLowerCase();
    const password = document.getElementById('lpass').value||'';
    
    // Validation
    if(!email || !password){
      showError('Please fill in all fields');
      return;
    }

    if(!validateEmail(email)){
      showError('Please enter a valid email address');
      return;
    }

    if(password.length < 6){
      showError('Password must be at least 6 characters');
      return;
    }

    setLoading(true);
    
    try{
      const res = await fetch('/api/auth/login', { 
        method:'POST', 
        headers:{ 'Content-Type':'application/json' }, 
        body: JSON.stringify({ email, password }) 
      });
      
      const body = await res.json().catch(()=>({}));
      
      if(!res.ok) { 
        showError(body.error || 'Login failed. Please try again.'); 
        return; 
      }
      
      saveSession(body.user, body.token);
      showSuccess('Login successful! Redirecting...');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
      
    }catch(e){
      console.error('Login error:', e);
      showError('Unable to connect to server. Please check your internet connection.');
    } finally {
      setLoading(false);
    }
  });

  // Check if already logged in
  const token = localStorage.getItem('mafiaToken');
  const user = localStorage.getItem('mafiaUser');
  if(token && user){
    window.location.href = 'index.html';
  }

  // Forgot password handler
  document.querySelector('.forgot-link').addEventListener('click', (e) => {
    e.preventDefault();
    showError('Password reset feature coming soon!');
  });

  // Social login handlers
  document.querySelectorAll('.social-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const provider = btn.textContent.includes('Discord') ? 'Discord' : 'Google';
      showError(`${provider} login coming soon!`);
    });
  });

  // Input field animations
  const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
  inputs.forEach(input => {
    input.addEventListener('focus', () => {
      input.parentElement.classList.add('focused');
    });
    
    input.addEventListener('blur', () => {
      if (!input.value) {
        input.parentElement.classList.remove('focused');
      }
    });
  });
})();
</script>
</body>
</html>
