<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login — MafiaArena</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body{background:#07121a;color:#e6eef6;font-family:Inter,system-ui,Arial;margin:0;padding:28px}
  .card{max-width:420px;margin:40px auto;padding:20px;background:#0b1220;border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
  input{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
  .btn{margin-top:12px;padding:10px;border-radius:10px;border:0;background:#1F6FEB;color:#07121a;cursor:pointer}
  .muted{color:rgba(230,238,246,0.7);margin-top:8px}
  .error{color:#ff6b6b;margin-top:8px}
  a{color:#ffd369}
</style>
</head>
<body>
  <div class="card" role="main">
    <h2>Login</h2>
    <div id="alert" class="muted"></div>
    <form id="loginForm" novalidate>
      <label for="lemail">Email</label>
      <input id="lemail" type="email" placeholder="you@example.com" required>

      <label for="lpass">Password</label>
      <input id="lpass" type="password" placeholder="Password" required>

      <div id="err" class="error" role="alert"></div>

      <button class="btn" type="submit">Login</button>
    </form>

    <div class="muted">No account? <a href="register.html">Register</a></div>
  </div>

<script>
/* filepath: c:\Users\Acer\Desktop\mafia\frontend\login.html */
(function(){
  const form = document.getElementById('loginForm');
  const err = document.getElementById('err');
  
  function saveSession(user, token){ 
    try{ 
      localStorage.setItem('mafiaUser', JSON.stringify(user));
      localStorage.setItem('mafiaToken', token);
    }catch(e){ 
      console.error('Failed to save session:', e);
    } 
  }

  function showError(message){
    if(err){
      err.textContent = message;
      err.style.display = 'block';
      setTimeout(() => {
        err.style.display = 'none';
      }, 5000);
    }
  }

  function showLoading(isLoading){
    const submitBtn = form.querySelector('button[type="submit"]');
    if(submitBtn){
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'Logging in...' : 'Login';
    }
  }

  form && form.addEventListener('submit', async function(e){
    e.preventDefault();
    err && (err.style.display='none');
    
    const data = {
      email: (document.getElementById('lemail').value||'').trim().toLowerCase(),
      password: document.getElementById('lpass').value||''
    };

    // Basic validation
    if(!data.email || !data.password){
      showError('Please fill in all fields');
      return;
    }

    if(!data.email.includes('@')){
      showError('Please enter a valid email');
      return;
    }

    showLoading(true);
    
    try{
      const res = await fetch('/api/auth/login', { 
        method:'POST', 
        headers:{ 'Content-Type':'application/json' }, 
        body: JSON.stringify(data) 
      });
      
      const body = await res.json().catch(()=>({}));
      
      if(!res.ok) { 
        showError(body.error || 'Login failed'); 
        return; 
      }
      
      saveSession(body.user, body.token);
      
      // Show success message
      showLoading(false);
      const successMsg = document.createElement('div');
      successMsg.textContent = 'Login successful! Redirecting...';
      successMsg.style.cssText = 'color: #00bfa6; margin-top: 8px;';
      form.appendChild(successMsg);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
      
    }catch(e){
      console.error('Login error:', e);
      showError('Unable to reach server. Check connection.');
    } finally {
      showLoading(false);
    }
  });

  // Check if already logged in
  const token = localStorage.getItem('mafiaToken');
  const user = localStorage.getItem('mafiaUser');
  if(token && user){
    window.location.href = 'index.html';
  }
})();
</script>
</body>
</html>
