<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Store — MafiaArena</title>
<meta name="description" content="Buy avatars, skins, themes and power-ups in MafiaArena store." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/styles.css">
<style>
/* Store specific styles */
.store-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.title {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--text-primary);
}

.controls {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.select {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: var(--glass);
  color: var(--text-primary);
  min-height: 44px;
  cursor: pointer;
}

/* Coin counter */
.coin-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--glass);
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--border-color);
}

.diamond-icon, .coin-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--bg-primary);
}

.diamond-icon {
  background: linear-gradient(90deg, #6EE7FF, var(--primary-color));
}

.coin-icon {
  background: linear-gradient(90deg, var(--accent-color), #FFB84D);
  animation: spin 2.5s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Store grid */
.store-grid {
  display: block;
  margin-top: 8px;
}

.main {
  max-width: 1200px;
  margin: 0 auto;
}

/* Tabs */
.tab {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--glass);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border-color);
}

.tab-btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
  min-height: 44px;
}

.tab-btn.active {
  background: linear-gradient(90deg, var(--primary-color), var(--success-color));
  color: var(--bg-primary);
}

/* Product cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.card {
  background: linear-gradient(180deg, var(--glass), rgba(0, 0, 0, 0.1));
  padding: 16px;
  border-radius: var(--border-radius);
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow);
  position: relative;
  transition: var(--transition);
  overflow: hidden;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
}

.card-inner {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 160px;
}

.card-front {
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-front .icon {
  font-size: 2.5rem;
  min-width: 48px;
  text-align: center;
}

.card-front .info h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text-primary);
}

.card-front .info p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.4;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border-color);
}

.price {
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--accent-color);
}

.buy {
  background: linear-gradient(90deg, var(--success-color), #00d17a);
  color: var(--bg-primary);
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  min-height: 36px;
}

.buy:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0, 191, 166, 0.3);
}

.buy:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Badge */
.badge-purchased {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--success-color);
  color: var(--bg-primary);
  padding: 6px 8px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 0.75rem;
  display: none;
  box-shadow: 0 4px 12px rgba(0, 191, 166, 0.3);
}

.card.purchased .badge-purchased {
  display: block;
}

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal {
  background: var(--bg-tertiary);
  padding: 24px;
  border-radius: var(--border-radius);
  border: 1px solid var(--border-color);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h3 {
  margin-bottom: 16px;
  color: var(--text-primary);
}

.modal .form-group {
  margin-bottom: 16px;
}

.modal .form-group label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  color: var(--text-secondary);
}

.modal .form-group input,
.modal .form-group select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  background: var(--glass);
  color: var(--text-primary);
}

.modal .actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* Toast */
.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: var(--success-color);
  color: var(--bg-primary);
  padding: 12px 16px;
  border-radius: 8px;
  display: none;
  z-index: 1001;
  font-weight: 600;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
}

/* Loading state */
.loading {
  pointer-events: none;
  opacity: 0.6;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .store-head {
    flex-direction: column;
    align-items: stretch;
    gap: 16px;
  }
  
  .title {
    font-size: 1.5rem;
    text-align: center;
  }
  
  .controls {
    flex-direction: column;
    gap: 8px;
  }
  
  .cards {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  
  .card {
    padding: 12px;
  }
  
  .card-front {
    flex-direction: column;
    text-align: center;
    gap: 8px;
  }
  
  .card-footer {
    flex-direction: column;
    gap: 8px;
    align-items: stretch;
  }
  
  .buy {
    width: 100%;
  }
  
  .modal {
    margin: 0;
    max-width: 100%;
  }
}

@media (max-width: 480px) {
  .tab {
    flex-direction: column;
  }
  
  .tab-btn {
    min-height: 48px;
  }
  
  .coin-box {
    padding: 6px 10px;
  }
  
  .diamond-icon, .coin-icon {
    width: 24px;
    height: 24px;
  }
}
</style>
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <div style="display:flex;align-items:center;gap:18px">
        <a href="index.html" class="brand">MafiaArena Store</a>
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <nav class="nav" id="mainNav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="play.html">Play</a>
          <a href="howto.html">How to Play</a>
        </nav>
      </div>

      <div style="display:flex;align-items:center;gap:12px">
        <div class="coin-box" aria-hidden="true">
          <div class="diamond-icon">◆</div>
          <div id="diamondCount">0</div>
          <div class="coin-icon">¢</div>
          <div id="coinCount">1,240</div>
        </div>
        <button id="topUpBtn" class="btn btn-primary">Top Up</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="store-head">
        <h1 class="title">Explore items</h1>
        <div class="controls">
          <select id="filter" class="select">
            <option value="all">All categories</option>
          </select>
          <select id="sort" class="select">
            <option value="pop">Sort: Popularity</option>
            <option value="low">Price: Low→High</option>
            <option value="high">Price: High→Low</option>
          </select>
        </div>
      </div>

      <div class="store-grid">
        <section class="main">
          <div class="tab">
            <button class="tab-btn active" data-tab="store">Store</button>
            <button class="tab-btn" data-tab="owned">My Items</button>
          </div>

          <div id="storeView">
            <div class="cards" id="cards"></div>
          </div>

          <div id="ownedView" style="display:none">
            <div class="card">
              <h3>Owned items</h3>
              <div class="owned" id="ownedList"></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Top Up modal -->
  <div id="topUpModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <h3>Top Up Coins</h3>
      <div class="form-group">
        <label for="topAmount">Amount</label>
        <input id="topAmount" type="number" min="100" value="500" />
      </div>
      <div class="form-group">
        <label for="payMethod">Payment method</label>
        <select id="payMethod">
          <option>PayPal</option>
          <option>Card</option>
          <option>Crypto</option>
        </select>
      </div>
      <div class="actions">
        <button id="cancelTop" class="btn btn-secondary">Cancel</button>
        <button id="confirmTop" class="btn btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Login overlay -->
  <div id="loginOverlay" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <h3>Please log in to access the Store</h3>
      <p class="text-secondary">You must be signed in to buy items.</p>
      <div style="margin-top:16px">
        <a href="login.html" class="btn btn-primary">Login</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">Purchased!</div>

  <!-- audio -->
  <audio id="clickSound"><source src="assets/click.mp3" type="audio/mpeg"></audio>
  <audio id="ambient" loop><source src="assets/ambient.mp3" type="audio/mpeg"></audio>

<script>
document.addEventListener('DOMContentLoaded', function(){
  // Check authentication
  const token = localStorage.getItem('mafiaToken');
  const user = JSON.parse(localStorage.getItem('mafiaUser') || 'null');
  
  if (!token || !user) {
    const loginOverlay = document.getElementById('loginOverlay');
    loginOverlay.style.display = 'flex';
    loginOverlay.setAttribute('aria-hidden', 'false');
    return;
  }

  // Mobile menu toggle
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const mainNav = document.getElementById('mainNav');
  
  if (mobileMenuBtn) {
    mobileMenuBtn.addEventListener('click', () => {
      mainNav.style.display = mainNav.style.display === 'flex' ? 'none' : 'flex';
    });
  }

  // Store functionality
  const items = [
    {id:1,cat:'avatars',title:'Masked Avenger',desc:'Stylish avatar with mask',price:150,icon:'😎'},
    {id:2,cat:'skins',title:'Red Elegance',desc:'Mafia role skin',price:300,icon:'🕴️'},
    {id:3,cat:'themes',title:'Neon City',desc:'Background theme',price:200,icon:'🌃'},
    {id:4,cat:'powerups',title:'Second Chance',desc:'Revive once per game',price:500,icon:'🔁'},
    {id:5,cat:'sounds',title:'Retro Pack',desc:'Sound effects pack',price:120,icon:'🔊'}
  ];
  
  let owned = [];
  let balance = 1240;
  const cardsEl = document.getElementById('cards');
  const ownedList = document.getElementById('ownedList');
  const coinCount = document.getElementById('coinCount');
  const toast = document.getElementById('toast');
  const clickSound = document.getElementById('clickSound');

  function renderItems(list){
    cardsEl.innerHTML = '';
    list.forEach(item => {
      const isPurchased = owned.some(o => o.id === item.id);
      const card = document.createElement('div');
      card.className = `card ${isPurchased ? 'purchased' : ''}`;
      card.dataset.id = item.id;
      
      card.innerHTML = `
        <div class="badge-purchased">Purchased!</div>
        <div class="card-inner">
          <div class="card-front">
            <div class="icon">${item.icon}</div>
            <div class="info">
              <h3>${item.title}</h3>
              <p>${item.desc}</p>
            </div>
          </div>
          <div class="card-footer">
            <div class="price">${item.price} Coins</div>
            <button class="buy" ${isPurchased ? 'disabled' : ''}>
              ${isPurchased ? 'Owned' : 'Buy'}
            </button>
          </div>
        </div>
      `;
      
      const buyBtn = card.querySelector('.buy');
      if (!isPurchased && buyBtn) {
        buyBtn.addEventListener('click', () => purchaseItem(item));
      }
      
      cardsEl.appendChild(card);
    });
  }

  function purchaseItem(item) {
    if (balance < item.price) {
      showToast('Not enough coins!');
      return;
    }
    
    try {
      clickSound.currentTime = 0;
      clickSound.play();
    } catch(e) {}
    
    balance -= item.price;
    coinCount.textContent = balance;
    
    owned.push({...item});
    showToast('Purchased!');
    renderItems(items);
    renderOwned();
  }

  function renderOwned(){
    ownedList.innerHTML = '';
    if (owned.length === 0) {
      ownedList.innerHTML = '<p class="text-secondary">No items owned yet</p>';
      return;
    }
    
    owned.forEach(item => {
      const el = document.createElement('div');
      el.className = 'flex justify-between items-center p-3 border-b';
      el.innerHTML = `
        <div>
          <strong>${item.title}</strong>
          <div class="text-sm text-secondary">${item.desc}</div>
        </div>
        <div>
          <button class="btn btn-secondary btn-sm" data-id="${item.id}" data-action="equip">Equip</button>
        </div>
      `;
      ownedList.appendChild(el);
    });
    
    ownedList.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        showToast(btn.dataset.action === 'equip' ? 'Equipped' : 'Unequipped');
      });
    });
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 2000);
  }

  // Filter and sort
  document.getElementById('filter').addEventListener('change', (e) => {
    const filter = e.target.value;
    let list = items.slice();
    if (filter !== 'all') {
      list = list.filter(i => i.cat === filter);
    }
    renderItems(list);
  });

  document.getElementById('sort').addEventListener('change', (e) => {
    const sort = e.target.value;
    let list = items.slice();
    if (sort === 'low') list.sort((a,b) => a.price - b.price);
    if (sort === 'high') list.sort((a,b) => b.price - a.price);
    renderItems(list);
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      const tab = btn.dataset.tab;
      if (tab === 'store') {
        document.getElementById('storeView').style.display = 'block';
        document.getElementById('ownedView').style.display = 'none';
      } else {
        document.getElementById('storeView').style.display = 'none';
        document.getElementById('ownedView').style.display = 'block';
        renderOwned();
      }
    });
  });

  // Top up modal
  const topUpModal = document.getElementById('topUpModal');
  document.getElementById('topUpBtn').addEventListener('click', () => {
    topUpModal.style.display = 'flex';
    topUpModal.setAttribute('aria-hidden', 'false');
  });
  
  document.getElementById('cancelTop').addEventListener('click', () => {
    topUpModal.style.display = 'none';
    topUpModal.setAttribute('aria-hidden', 'true');
  });
  
  document.getElementById('confirmTop').addEventListener('click', () => {
    const amount = parseInt(document.getElementById('topAmount').value || 0);
    if (amount <= 0) {
      showToast('Enter a valid amount');
      return;
    }
    
    balance += amount;
    coinCount.textContent = balance;
    topUpModal.style.display = 'none';
    topUpModal.setAttribute('aria-hidden', 'true');
    showToast('Top up successful!');
  });

  // Close modals on backdrop click
  document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) {
        backdrop.style.display = 'none';
        backdrop.setAttribute('aria-hidden', 'true');
      }
    });
  });

  // Initialize
  renderItems(items);
  coinCount.textContent = balance;
});
</script>
</body>
</html>
