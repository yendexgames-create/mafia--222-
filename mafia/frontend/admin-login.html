<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Admin Login - Mafia Game</title>
	<link rel="stylesheet" href="css/style.css">
	<style>
		/* Minimal inline styles so page works standalone */
		body { font-family: Arial, sans-serif; background: #0f1724; color: #e6eef8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
		.login-card { background: #111827; padding: 2rem; border-radius: 8px; width: 360px; box-shadow: 0 6px 18px rgba(0,0,0,0.5); }
		h2 { margin: 0 0 1rem 0; font-size: 1.2rem; color: #f8fafc; }
		label { display:block; margin-top: 0.75rem; font-size: 0.85rem; color: #cbd5e1; }
		input { width: 100%; padding: 0.6rem; margin-top: 0.25rem; border-radius: 6px; border: 1px solid #334155; background: #0b1220; color: #e6eef8; }
		button { margin-top: 1rem; width: 100%; padding: 0.6rem; border: none; border-radius: 6px; background: #2563eb; color: white; cursor: pointer; }
		.note { margin-top: 0.5rem; font-size: 0.8rem; color: #9ca3af; }
		.error { margin-top: 0.5rem; color: #ff6b6b; font-size: 0.9rem; }
		.link { margin-top: 0.75rem; text-align: center; font-size: 0.85rem; color: #93c5fd; cursor: pointer; }
	</style>
</head>
<body>
	<div class="login-card" role="main" aria-labelledby="loginTitle">
		<h2 id="loginTitle">Admin Login</h2>

		<form id="adminLoginForm" autocomplete="off" novalidate>
			<label for="username">Username</label>
			<input id="username" name="username" type="text" required autofocus />

			<label for="password">Password</label>
			<input id="password" name="password" type="password" required />

			<button type="submit">Sign in</button>

			<div class="error" id="errorMsg" aria-live="polite" style="display:none"></div>
			<div class="note">If you don't have a backend, use <strong>admin / admin123</strong> (local fallback).</div>
			<div class="link" id="backToSite">← Back to site</div>
		</form>
	</div>

	<script>
		// Small helper to show errors
		function showError(msg) {
			const el = document.getElementById('errorMsg');
			el.style.display = msg ? 'block' : 'none';
			el.textContent = msg || '';
		}

		// Create a simple random token (for demo only)
		function makeToken() {
			const arr = new Uint8Array(16);
			window.crypto.getRandomValues(arr);
			return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
		}

		document.getElementById('backToSite').addEventListener('click', () => {
			window.location.href = 'index.html';
		});

		document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
			e.preventDefault();
			showError('');

			const username = (document.getElementById('username').value || '').trim();
			const password = (document.getElementById('password').value || '').trim();

			if (!username || !password) {
				showError('Please enter username and password.');
				return;
			}

			// Try backend login first
			try {
				const res = await fetch('/api/admin/login', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ username, password })
				});

				if (res.ok) {
					const data = await res.json();
					if (data && data.token) {
						sessionStorage.setItem('adminToken', data.token);
						window.location.href = 'admin.html';
						return;
					}
				} else if (res.status === 401) {
					showError('Invalid credentials (server).');
					return;
				}
			} catch (err) {
				console.warn('Login API unavailable, using local fallback.');
			}

			// Local fallback (demo only)
			if (username === 'admin' && password === 'admin123') {
				const token = makeToken();
				sessionStorage.setItem('adminToken', token);
				window.location.href = 'admin.html';
				return;
			}

			showError('Invalid credentials.');
		});
	</script>
</body>
</html>
