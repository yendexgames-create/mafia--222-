<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register — MafiaArena</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--neon:#1F6FEB}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#071021,#0d1117);color:#e6eef6}
    .wrap{max-width:740px;margin:60px auto;padding:20px}
    .card{background:rgba(255,255,255,0.02);padding:24px;border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
    h1{margin:0 0 12px}
    label{display:block;margin-top:10px;font-size:14px}
    input, select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    .row{display:flex;gap:8px;margin-top:16px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn{padding:10px 12px;border-radius:10px;border:0;cursor:pointer}
    .btn-primary{background:linear-gradient(90deg,var(--neon),#00bfa6);color:#07121a}
    .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:inherit;padding:8px 12px;border-radius:10px;text-decoration:none}
    .muted{color:rgba(230,238,246,0.7);font-size:13px;margin-top:8px}
    .error{color:#ff6b6b;margin-top:8px;display:none}
    .alert{margin-bottom:12px;padding:10px;border-radius:8px;background:#2b0b0b;color:#ffd9a0;border:1px solid rgba(255,215,128,0.08);display:none}
    @media(max-width:600px){ .two{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="card" role="region" aria-labelledby="regTitle">
      <h1 id="regTitle">Create account</h1>

      <div id="msgAlert" class="alert" role="status" aria-live="polite"></div>

      <form id="regForm" novalidate>
        <div class="two">
          <div>
            <label for="rname">First name</label>
            <input id="rname" name="name" type="text" required placeholder="First name" autocomplete="given-name" />
          </div>
          <div>
            <label for="rsurname">Surname</label>
            <input id="rsurname" name="surname" type="text" required placeholder="Surname" autocomplete="family-name" />
          </div>
        </div>

        <label for="remail">Email</label>
        <input id="remail" name="email" type="email" required placeholder="you@example.com" autocomplete="email" inputmode="email" />

        <label for="rcountry">Country</label>
        <select id="rcountry" name="country" required>
          <option value="">Select country</option>
          <option value="US">United States</option>
          <option value="UZ">Uzbekistan</option>
          <option value="RU">Russia</option>
          <option value="GB">United Kingdom</option>
        </select>

        <label for="rgender">Gender</label>
        <select id="rgender" name="gender" required>
          <option value="">Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <div class="two" style="margin-top:8px">
          <div>
            <label for="rpass">Password</label>
            <input id="rpass" name="password" type="password" required placeholder="Create password" autocomplete="new-password" />
          </div>
          <div>
            <label for="rpass2">Repeat password</label>
            <input id="rpass2" name="password2" type="password" required placeholder="Repeat password" autocomplete="new-password" />
          </div>
        </div>

        <div id="err" class="error" role="alert"></div>

        <div class="row">
          <button type="submit" class="btn btn-primary">Create account</button>
          <a href="index.html" class="btn-ghost">Cancel</a>
        </div>
      </form>

      <div class="muted">Already have an account? <a href="login.html" class="link">Login</a></div>
    </div>
  </main>

<script>
(function(){
  const form = document.getElementById('regForm');
  const err = document.getElementById('err');
  const msgAlert = document.getElementById('msgAlert');

  // show message from query param if present
  const params = new URLSearchParams(location.search);
  const msg = params.get('msg');
  if(msg){
    try{ msgAlert.textContent = decodeURIComponent(msg); msgAlert.style.display = 'block'; }catch(e){} 
  }

  function saveUsersList(users){
    try{ localStorage.setItem('mafia_users', JSON.stringify(users)); return true; }catch(e){ return false; }
  }
  function getUsersList(){
    try{ return JSON.parse(localStorage.getItem('mafia_users') || '[]'); }catch(e){ return []; }
  }
  function saveSession(user){
    try{
      // ensure session object has the same shape index.html expects
      const sess = {
        name: user.name,
        surname: user.surname || '',
        email: user.email || '',
        level: user.level || 1,
        avatar: user.avatar || (user.name ? user.name.charAt(0).toUpperCase() : 'U')
      };
      localStorage.setItem('mafiaUser', JSON.stringify(sess));
      return true;
    }catch(e){ return false; }
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    err.style.display = 'none'; err.textContent = '';
    msgAlert.style.display = 'none';

    const name = (document.getElementById('rname').value || '').trim();
    const surname = (document.getElementById('rsurname').value || '').trim();
    const email = (document.getElementById('remail').value || '').trim().toLowerCase();
    const country = (document.getElementById('rcountry').value || '').trim();
    const gender = (document.getElementById('rgender').value || '').trim();
    const pass = document.getElementById('rpass').value || '';
    const pass2 = document.getElementById('rpass2').value || '';

    if(!name || !surname){ err.textContent = 'Please enter your name and surname.'; err.style.display='block'; return; }
    // simple email validation
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!email || !emailRe.test(email)){ err.textContent = 'Please enter a valid email address.'; err.style.display='block'; return; }
    if(!country){ err.textContent = 'Please select your country.'; err.style.display='block'; return; }
    if(gender !== 'male' && gender !== 'female'){ err.textContent = 'Please select gender.'; err.style.display='block'; return; }
    if(pass.length < 6){ err.textContent = 'Password must be at least 6 characters.'; err.style.display='block'; return; }
    if(pass !== pass2){ err.textContent = 'Passwords do not match.'; err.style.display='block'; return; }

    const avatar = name.charAt(0).toUpperCase();
    const user = { name: name, surname: surname, email: email, country: country, gender: gender, level: 1, avatar: avatar, password: pass };

    // check duplicates by email
    const users = getUsersList();
    if(users.find(u => u.email === email)){
      err.textContent = 'Account with this email already exists. Please login.'; err.style.display='block'; return;
    }
    users.push(user);
    if(!saveUsersList(users)){ alert('Unable to save user list'); return; }
    // save session with normalized shape
    saveSession(user);
    // redirect to index (so profile looks same as on Home)
    window.location.href = 'index.html';
  });
})();
</script>
<script>
/* filepath: c:\Users\Acer\Desktop\mafia\frontend\register.html */
(function(){
  const form = document.getElementById('regForm');
  const err = document.getElementById('err');
  
  function saveSession(user, token){ 
    try{ 
      localStorage.setItem('mafiaUser', JSON.stringify(user));
      localStorage.setItem('mafiaToken', token);
    }catch(e){ 
      console.error('Failed to save session:', e);
    } 
  }

  function showError(message){
    if(err){
      err.textContent = message;
      err.style.display = 'block';
      setTimeout(() => {
        err.style.display = 'none';
      }, 5000);
    }
  }

  function showLoading(isLoading){
    const submitBtn = form.querySelector('button[type="submit"]');
    if(submitBtn){
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'Creating account...' : 'Create account';
    }
  }

  form && form.addEventListener('submit', async function(e){
    e.preventDefault();
    err && (err.style.display='none');
    
    const name = (document.getElementById('rname').value||'').trim();
    const surname = (document.getElementById('rsurname').value||'').trim();
    const email = (document.getElementById('remail').value||'').trim().toLowerCase();
    const password = document.getElementById('rpass').value||'';
    
    const fullName = name + (surname ? ' ' + surname : '');
    
    const data = {
      name: fullName,
      email: email,
      password: password
    };

    // Basic validation
    if(!name || !email || !password){
      showError('Please fill in all required fields');
      return;
    }

    if(!email.includes('@')){
      showError('Please enter a valid email');
      return;
    }

    if(password.length < 6){
      showError('Password must be at least 6 characters');
      return;
    }

    showLoading(true);
    
    try{
      const res = await fetch('/api/auth/register', { 
        method:'POST', 
        headers:{ 'Content-Type':'application/json' }, 
        body: JSON.stringify(data) 
      });
      
      const body = await res.json().catch(()=>({}));
      
      if(!res.ok) { 
        showError(body.error || 'Registration failed'); 
        return; 
      }
      
      saveSession(body.user, body.token);
      
      // Show success message
      showLoading(false);
      const successMsg = document.createElement('div');
      successMsg.textContent = 'Account created successfully! Redirecting...';
      successMsg.style.cssText = 'color: #00bfa6; margin-top: 8px;';
      form.appendChild(successMsg);
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
      
    }catch(e){
      console.error('Registration error:', e);
      showError('Unable to reach server. Check connection.');
    } finally {
      showLoading(false);
    }
  });

  // Check if already logged in
  const token = localStorage.getItem('mafiaToken');
  const user = localStorage.getItem('mafiaUser');
  if(token && user){
    window.location.href = 'index.html';
  }
})();
</script>
</body>
</html>
